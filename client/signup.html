<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up -vk's</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-container">
      <h1>Registration form</h1>

      <input type="text" id="new-username" placeholder="Choose Username" />
      <input type="email" id="new-email" placeholder="Email Address" />
      <input type="password" id="new-password" placeholder="Create Password" />
      <input
        type="password"
        id="confirm-password"
        placeholder="Confirm Password"
      />

      <button onclick="signup()">Sign Up</button>

      <p id="message"></p>

      <p class="switch-form">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>

    <script src="signup.js"></script>
  </body>
</html>
