<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VK Store</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="store-page">
    <header class="store-topbar">
      <div>
        <h1>VK Store</h1>
        <p id="welcome-user">Welcome</p>
      </div>
      <div class="store-actions">
        <button id="cart-toggle" type="button">Cart <span id="cart-count">0</span></button>
        <button id="logout-button" class="btn-secondary" type="button">Logout</button>
      </div>
    </header>

    <main class="store-shell">
      <section class="store-toolbar">
        <input id="search-input" type="search" placeholder="Search products" />
        <select id="category-filter">
          <option value="">All categories</option>
          <option value="Electronics">Electronics</option>
          <option value="Clothing">Clothing</option>
          <option value="Books">Books</option>
          <option value="Home">Home</option>
          <option value="Sports">Sports</option>
          <option value="Other">Other</option>
        </select>
      </section>

      <p id="store-message" class="store-message"></p>
      <section id="product-grid" class="catalog-grid"></section>
    </main>

    <aside id="cart-panel" class="cart-panel">
      <div class="cart-panel-header">
        <h2>Your Cart</h2>
        <button id="cart-close" type="button">&times;</button>
      </div>
      <div id="cart-items" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span>
          <strong id="cart-total">Rs. 0</strong>
        </div>
        <button id="checkout-button" type="button">Checkout</button>
        <button id="clear-cart-button" class="btn-secondary" type="button">Clear Cart</button>
      </div>
    </aside>

    <div id="cart-backdrop" class="cart-backdrop"></div>

    <script>
      const API_BASE_URL =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "http://localhost:5000"
          : "https://e-commerce-store-3-guwg.onrender.com";

      const token = localStorage.getItem("token");
      const user = JSON.parse(localStorage.getItem("user") || "null");
      const productGrid = document.getElementById("product-grid");
      const storeMessage = document.getElementById("store-message");
      const cartPanel = document.getElementById("cart-panel");
      const cartBackdrop = document.getElementById("cart-backdrop");

      if (!token) {
        window.location.replace("login.html");
      }

      if (user && user.name) {
        document.getElementById("welcome-user").textContent = `Welcome, ${user.name}`;
      }

      function authHeaders() {
        return {
          "Content-Type": "application/json",
          Authorization: `Bearer ${localStorage.getItem("token")}`,
        };
      }

      function formatRupees(amount) {
        return `Rs. ${Number(amount || 0).toLocaleString("en-IN")}`;
      }

      function showMessage(message, isError = false) {
        storeMessage.textContent = message;
        storeMessage.style.color = isError ? "#c62828" : "#2e7d32";
      }

      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        localStorage.removeItem("selectedItem");
        localStorage.removeItem("selectedPrice");
        window.location.href = "login.html";
      }

      async function apiFetch(path, options = {}) {
        const response = await fetch(`${API_BASE_URL}${path}`, options);
        const data = await response.json().catch(() => ({}));
        if (response.status === 401) {
          logout();
          return data;
        }
        if (!response.ok) {
          throw new Error(data.message || "Request failed");
        }
        return data;
      }

      async function loadProducts() {
        const search = document.getElementById("search-input").value.trim();
        const category = document.getElementById("category-filter").value;
        const params = new URLSearchParams();
        if (search) params.set("search", search);
        if (category) params.set("category", category);

        productGrid.innerHTML = '<p class="loading-text">Loading products...</p>';
        try {
          const data = await apiFetch(`/api/products?${params.toString()}`);
          renderProducts(data.products || []);
        } catch (error) {
          productGrid.innerHTML = "";
          showMessage(error.message, true);
        }
      }

      function renderProducts(products) {
        if (!products.length) {
          productGrid.innerHTML = '<p class="loading-text">No products found.</p>';
          return;
        }

        productGrid.innerHTML = products
          .map((product) => {
            const finalPrice = Math.round(
              product.price - product.price * ((product.discount || 0) / 100),
            );
            return `
              <article class="product-tile">
                <div class="product-image-wrap">
                  <img src="${product.image}" alt="${product.name}" />
                </div>
                <div class="product-info">
                  <div class="product-meta">
                    <span>${product.category}</span>
                    <span>${product.stock > 0 ? `${product.stock} in stock` : "Out of stock"}</span>
                  </div>
                  <h2>${product.name}</h2>
                  <p>${product.description}</p>
                  <div class="product-price-row">
                    <strong>${formatRupees(finalPrice)}</strong>
                    ${
                      product.discount
                        ? `<span class="old-price">${formatRupees(product.price)}</span>`
                        : ""
                    }
                  </div>
                  <div class="product-buttons">
                    <button type="button" onclick="buyNow('${product._id}')" ${product.stock < 1 ? "disabled" : ""}>Buy Now</button>
                    <button class="btn-secondary" type="button" onclick="addToCart('${product._id}')" ${product.stock < 1 ? "disabled" : ""}>Add to Cart</button>
                  </div>
                </div>
              </article>
            `;
          })
          .join("");
      }

      async function addToCart(productId, quiet = false) {
        try {
          await apiFetch("/api/cart/add", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ productId, quantity: 1 }),
          });
          await loadCart();
          if (!quiet) showMessage("Added to cart.");
        } catch (error) {
          showMessage(error.message, true);
        }
      }

      async function buyNow(productId) {
        await addToCart(productId, true);
        window.location.href = "address.html";
      }

      async function loadCart() {
        try {
          const data = await apiFetch("/api/cart", {
            headers: authHeaders(),
          });
          renderCart(data.cart);
        } catch (error) {
          if (error.message === "Cart not found") {
            renderCart({ items: [], totalPrice: 0 });
            return;
          }
          showMessage(error.message, true);
        }
      }

      function renderCart(cart) {
        const items = cart && cart.items ? cart.items : [];
        document.getElementById("cart-count").textContent = items.reduce(
          (total, item) => total + item.quantity,
          0,
        );
        document.getElementById("cart-total").textContent = formatRupees(
          cart ? cart.totalPrice : 0,
        );

        const cartItems = document.getElementById("cart-items");
        if (!items.length) {
          cartItems.innerHTML = '<p class="empty-cart">Your cart is empty.</p>';
          return;
        }

        cartItems.innerHTML = items
          .map((item) => {
            const product = item.productId || {};
            return `
              <div class="cart-line">
                <img src="${product.image || ""}" alt="${product.name || "Product"}" />
                <div>
                  <strong>${product.name || "Product"}</strong>
                  <span>${formatRupees(item.price)} x ${item.quantity}</span>
                  <div class="cart-line-actions">
                    <button type="button" onclick="updateCartItem('${product._id}', ${item.quantity - 1})">-</button>
                    <button type="button" onclick="updateCartItem('${product._id}', ${item.quantity + 1})">+</button>
                    <button type="button" onclick="removeCartItem('${product._id}')">Remove</button>
                  </div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      async function updateCartItem(productId, quantity) {
        if (quantity < 1) {
          await removeCartItem(productId);
          return;
        }
        try {
          await apiFetch("/api/cart/update", {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify({ productId, quantity }),
          });
          await loadCart();
        } catch (error) {
          showMessage(error.message, true);
        }
      }

      async function removeCartItem(productId) {
        try {
          await apiFetch("/api/cart/remove", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ productId }),
          });
          await loadCart();
        } catch (error) {
          showMessage(error.message, true);
        }
      }

      async function clearCart() {
        try {
          await apiFetch("/api/cart/clear", {
            method: "DELETE",
            headers: authHeaders(),
          });
          await loadCart();
        } catch (error) {
          showMessage(error.message, true);
        }
      }

      function openCart() {
        cartPanel.classList.add("open");
        cartBackdrop.classList.add("open");
      }

      function closeCart() {
        cartPanel.classList.remove("open");
        cartBackdrop.classList.remove("open");
      }

      document.getElementById("logout-button").addEventListener("click", logout);
      document.getElementById("cart-toggle").addEventListener("click", openCart);
      document.getElementById("cart-close").addEventListener("click", closeCart);
      cartBackdrop.addEventListener("click", closeCart);
      document.getElementById("checkout-button").addEventListener("click", () => {
        window.location.href = "address.html";
      });
      document.getElementById("clear-cart-button").addEventListener("click", clearCart);
      document.getElementById("search-input").addEventListener("input", loadProducts);
      document.getElementById("category-filter").addEventListener("change", loadProducts);

      loadProducts();
      loadCart();
    </script>
  </body>
</html>
